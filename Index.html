            <div style={{paddingLeft:30}}>
              <pre style={{background:'#0f172a',color:'#a5f3fc',borderRadius:10,padding:'12px 14px',fontSize:11,overflow:'auto',whiteSpace:'pre-wrap'}}>{rulesJson}</pre>
              <Btn kind="soft" style={{fontSize:11,padding:'6px 11px',marginTop:6}} onClick={copyRules}>{copied?'✓ Đã copy':'📋 Copy nội dung Rules'}</Btn>
              <p style={{fontSize:11,color:'#94a3b8',marginTop:6,lineHeight:1.6}}>
                Lưu ý: Rules trên cho phép đọc/ghi tự do (phù hợp thử nghiệm). Khi triển khai thật, nên đổi thành <code>"auth != null"</code> sau khi đã bật Anonymous Auth ở bước 1.
              </p>
            </div>
          </div>

          <div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
              <span style={{width:22,height:22,borderRadius:'50%',background:'#4f46e5',color:'#fff',fontSize:12,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center'}}>3</span>
              <b style={{fontSize:14}}>Kiểm tra mạng / tường lửa</b>
            </div>
            <p style={{fontSize:12,color:'#475569',lineHeight:1.7,paddingLeft:30}}>
              Nếu vẫn lỗi, kiểm tra Internet hoặc tường lửa cơ quan có chặn <code>*.firebaseio.com</code> / <code>*.firebasedatabase.app</code> không. Thử mở bằng mạng 4G để loại trừ.
            </p>
          </div>

          <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:11,padding:'12px 15px'}}>
            <p style={{fontSize:12,color:'#1e40af',fontWeight:700,lineHeight:1.6}}>
              💡 Trong khi chưa khắc phục được Firebase, hệ thống vẫn cho phép bạn dùng <b>chế độ ngoại tuyến</b> (dữ liệu lưu tại trình duyệt này). Khi kết nối Firebase được khắc phục, hãy nhập lại dữ liệu hoặc liên hệ quản trị để đồng bộ.
            </p>
          </div>
        </div>
      </Card>
    </div>
  );
}

/* ═══════════════════ MAIN APP ═══════════════════ */
function App(){
  const [db,setDB]=useState(null);
  const [profile,setProfile]=useState(null);
  const [tab,setTab]=useState('dashboard');
  const [fbStatus,setFbStatus]=useState('connecting'); // connecting | connected | offline
  const [fbError,setFbError]=useState(null);
  const [showHelp,setShowHelp]=useState(false);
  const [toasts,setToasts]=useState([]);
  const listenersRef=useRef([]);

  const toast=useCallback((type,msg)=>{
    const id=xid('t');
    setToasts(t=>[...t,{id,type,msg}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3800);
  },[]);

  const onDBChange=useCallback((key,val)=>{
    setDB(prev=>prev?{...prev,[key]:val}:prev);
  },[]);

  useEffect(()=>{
    initApp();
    return()=>listenersRef.current.forEach(u=>u());
  },[]);

  // Áp dụng dữ liệu (điền mặc định nếu thiếu, ghi lại nếu cần, đăng ký listener realtime)
  async function applyDataAndSubscribe(data){
    const units=data.units||DEFAULT_UNITS;
    const passwords=data.passwords||DEFAULT_PASSWORDS;
    const indicators=data.indicators?.length?data.indicators:INDICATORS_2026;
    const reportSections=data.reportSections?.length?data.reportSections:DEFAULT_REPORT_SECTIONS;
    const adhocSections=data.adhocSections?.length?data.adhocSections:DEFAULT_ADHOC_SECTIONS;

    const writes=[];
    if(!data.units) writes.push(FDB.saveUnits(units));
    if(!data.passwords) writes.push(FDB.savePasswords(passwords));
    if(!data.indicators?.length) writes.push(FDB.saveIndicators(indicators));
    if(!data.reportSections?.length) writes.push(FDB.saveReportSections(reportSections));
    if(!data.adhocSections?.length) writes.push(FDB.saveAdhocSections(adhocSections));
    if(writes.length){try{await Promise.all(writes)}catch(e){console.warn('Lỗi ghi giá trị mặc định:',e)}}

    setDB({...data,units,passwords,indicators,reportSections,adhocSections});

    listenersRef.current.forEach(u=>u());
    listenersRef.current=FDB.subscribeAll({
      reports:    reports=>setDB(p=>p?{...p,reports}:p),
      adhocReports:adhocReports=>setDB(p=>p?{...p,adhocReports}:p),
      tasks:      tasks=>setDB(p=>p?{...p,tasks}:p),
      taskProgress:taskProgress=>setDB(p=>p?{...p,taskProgress}:p),
      settings:   settings=>setDB(p=>p?{...p,settings}:p),
    });
  }

  function localSnapshot(){
    LDB.init();
    const raw=LDB.store||{};
    const cfg=raw.config||{};
    return{
      settings:cfg.settings||{deadlineDay:10,isLocked:false,allowOverride:{},sessionTimeout:45},
      units:cfg.units||null,
      passwords:cfg.passwords||null,
      indicators:FDB.parseArr(cfg.indicators,null),
      reportSections:FDB.parseArr(cfg.reportSections,null),
      adhocSections:FDB.parseArr(cfg.adhocSections,null),
      announcements:FDB.parseArr(cfg.announcements,[]),
      reports:FDB.toMap(raw.reports),
      adhocReports:FDB.toMap(raw.adhocReports),
      tasks:FDB.toMap(raw.tasks),
      taskProgress:FDB.toMap(raw.taskProgress),
      audit:FDB.toArr(raw.audit).slice(-100).reverse(),
    };
  }

  function goOffline(error){
    console.error('[Firebase] Chuyển sang chế độ ngoại tuyến:',error);
    FDB.USE_LOCAL=true;
    setFbStatus('offline');
    setFbError(error);
    applyDataAndSubscribe(localSnapshot());
  }

  async function initApp(){
    setFbStatus('connecting');
    setFbError(null);
    FDB.USE_LOCAL=false;

    // Bước 0: SDK Firebase đã khởi tạo thành công chưa
    if(window._FB_INIT_ERROR){
      return goOffline({code:'init-failed',message:'Lỗi khởi tạo Firebase SDK: '+window._FB_INIT_ERROR});
    }
    if(!window._FB_DB||!window._FB_CLOUD_REF){
      return goOffline({code:'no-db',message:'Không khởi tạo được đối tượng Firebase Database. Kiểm tra lại databaseURL trong cấu hình.'});
    }

    // Bước 1: kết nối mạng tới server Firebase (không phụ thuộc Rules/Auth)
    try{
      await FDB.testConnection();
    }catch(e){
      return goOffline({code:'network',message:'Không kết nối được tới máy chủ Firebase. Kiểm tra Internet hoặc tường lửa (chặn *.firebasedatabase.app). Chi tiết: '+e.message});
    }

    // Bước 2: đăng nhập ẩn danh – cố gắng nhưng không chặn cứng nếu lỗi
    try{
      await FDB.withTimeout(firebase.auth().signInAnonymously(),8000,'Auth timeout');
    }catch(authErr){
      console.warn('[Firebase] Đăng nhập ẩn danh thất bại (Anonymous Auth chưa bật?). Vẫn thử đọc theo Rules hiện tại:',authErr.code,authErr.message);
    }

    // Bước 3: thử đọc dữ liệu thật – nơi PERMISSION_DENIED thường lộ ra
    try{
      const data=await FDB.loadAll();
      await applyDataAndSubscribe(data);
      setFbStatus('connected');
      setFbError(null);
    }catch(err){
      const isDenied=err.code==='PERMISSION_DENIED'||/permission/i.test(err.message||'');
      goOffline({
        code:isDenied?'permission-denied':'read-failed',
        message:isDenied
          ?'Bị từ chối quyền truy cập (PERMISSION_DENIED). Cần cập nhật Realtime Database Rules trong Firebase Console.'
          :('Lỗi tải dữ liệu từ Firebase: '+err.message),
      });
    }
  }

  function retryConnect(){
    toast('warn','Đang thử kết nối lại Firebase…');
    initApp();
  }

  if(!db){
    return(
      <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#0f172a',gap:18,padding:20}}>
        <div style={{width:52,height:52,border:'4px solid #f59e0b',borderTopColor:'transparent',borderRadius:'50%'}} className="spin"/>
        <div style={{textAlign:'center'}}>
          <p style={{color:'rgba(255,255,255,.8)',fontWeight:900,fontSize:15}}>Đang kết nối Firebase RTDB…</p>
          <p style={{color:'rgba(255,255,255,.35)',fontSize:12,marginTop:6}}>bao-cao-doan · asia-southeast1 · cong_bao_cao_doan_v31</p>
        </div>
      </div>
    );
  }

  if(fbStatus==='offline'&&fbError&&!profile){
    return(
      <>
        <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(145deg,#0f172a,#1e1b4b)',padding:20}}>
          <Card style={{maxWidth:480,width:'100%',padding:32,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',color:'#fff'}}>
            <div style={{fontSize:40,marginBottom:10,textAlign:'center'}}>⚠️</div>
            <h2 style={{fontSize:18,fontWeight:1000,textAlign:'center',marginBottom:8}}>Không kết nối được Firebase</h2>
            <div style={{background:'rgba(239,68,68,.15)',border:'1px solid rgba(239,68,68,.3)',borderRadius:11,padding:'10px 13px',marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:900,color:'#fca5a5',marginBottom:3}}>{fbError.code}</div>
              <div style={{fontSize:12,color:'#fecaca',lineHeight:1.6}}>{fbError.message}</div>
            </div>
            <p style={{fontSize:12,color:'rgba(255,255,255,.5)',lineHeight:1.7,marginBottom:18,textAlign:'center'}}>
              Bạn có thể tiếp tục dùng <b>chế độ ngoại tuyến</b> (lưu tại trình duyệt này) trong khi khắc phục Firebase.
            </p>
            <div style={{display:'flex',flexDirection:'column',gap:9}}>
              <Btn onClick={retryConnect} style={{width:'100%',padding:13}}>🔄 Thử kết nối lại</Btn>
              <Btn kind="soft" onClick={()=>setShowHelp(true)} style={{width:'100%',padding:13}}>🛠 Xem hướng dẫn khắc phục</Btn>
              <Btn kind="ok" onClick={()=>setFbError(null)} style={{width:'100%',padding:13}}>➡ Tiếp tục dùng ngoại tuyến</Btn>
            </div>
          </Card>
        </div>
        {showHelp&&<SetupHelpModal errorInfo={fbError} onClose={()=>setShowHelp(false)}/>}
        <Toasts list={toasts}/>
      </>
    );
  }

  if(!profile){
    return(
      <>
        <Login units={db.units||DEFAULT_UNITS} passwords={db.passwords||DEFAULT_PASSWORDS} onLogin={u=>{setProfile(u);FDB.addAudit('LOGIN',u,{},'info');}} toast={toast} fbStatus={fbStatus}/>
        <Toasts list={toasts}/>
      </>
    );
  }

  const isAdmin=profile.type==='admin';
  const nav=isAdmin
    ?[['dashboard','📊','Dashboard'],['monitoring','📋','Theo dõi BC'],['adhoc','🚨','Báo cáo đột xuất'],['indicators','🎯','Chỉ tiêu năm'],['taskboard','📌','Giao việc'],['reportout','📄','Xuất báo cáo'],['schema','🧩','Cấu hình trường'],['audit','🔍','Nhật ký'],['settings','⚙️','Cài đặt']]
    :[['dashboard','📊','Dashboard'],['report','📝','Nộp báo cáo'],['adhoc','🚨','Báo cáo đột xuất'],['taskboard','📌','Công việc'],['audit','🔍','Nhật ký']];

  const adhocCount=isAdmin
    ?Object.values(db.adhocReports||{}).filter(a=>a.month===CURRENT_MONTH).length
    :Object.values(db.adhocReports||{}).filter(a=>a.unitId===profile.id&&a.month===CURRENT_MONTH).length;

  const fbDot={connected:'#22c55e',connecting:'#f59e0b',offline:'#ef4444'}[fbStatus]||'#94a3b8';
  const fbTxt={connected:'RTDB Online',connecting:'Đang kết nối…',offline:'Ngoại tuyến'}[fbStatus]||'';

  return(
    <div style={{height:'100vh',display:'flex',overflow:'hidden'}}>
      {/* SIDEBAR */}
      <aside className="no-print" style={{width:240,background:'#0f172a',color:'#fff',display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'20px 18px',borderBottom:'1px solid rgba(255,255,255,.09)'}}>
          <div style={{fontSize:20,fontWeight:1000,letterSpacing:-.5}}>⚡ CỔNG ĐOÀN</div>
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:5}}>
            <span style={{width:7,height:7,borderRadius:'50%',background:fbDot,flexShrink:0}} className={fbStatus==='connecting'?'pulse':''}/>
            <span style={{fontSize:9,letterSpacing:1.2,color:'rgba(255,255,255,.35)',fontWeight:900}}>v{APP_VERSION} · {fbTxt}</span>
          </div>
          {fbStatus==='offline'&&(
            <div style={{display:'flex',gap:6,marginTop:9}}>
              <button onClick={retryConnect} style={{flex:1,background:'rgba(99,102,241,.25)',border:'none',borderRadius:8,padding:'6px 8px',color:'#c7d2fe',fontWeight:850,fontSize:10,cursor:'pointer'}}>🔄 Thử lại</button>
              <button onClick={()=>setShowHelp(true)} style={{flex:1,background:'rgba(255,255,255,.08)',border:'none',borderRadius:8,padding:'6px 8px',color:'rgba(255,255,255,.7)',fontWeight:850,fontSize:10,cursor:'pointer'}}>🛠 Khắc phục</button>
            </div>
          )}
        </div>
        <nav style={{padding:10,display:'flex',flexDirection:'column',gap:3,flex:1,overflowY:'auto'}}>
          {nav.map(([id,icon,label])=>(
            <button key={id} onClick={()=>setTab(id)}
              style={{display:'flex',alignItems:'center',gap:9,padding:'11px 14px',border:'none',borderRadius:12,textAlign:'left',background:tab===id?'rgba(99,102,241,.3)':'transparent',color:tab===id?'#c7d2fe':'rgba(255,255,255,.6)',fontWeight:850,fontSize:13,transition:'all .15s'}}
              onMouseEnter={e=>tab!==id&&(e.currentTarget.style.background='rgba(255,255,255,.06)')}
              onMouseLeave={e=>tab!==id&&(e.currentTarget.style.background='transparent')}>
              <span style={{fontSize:16}}>{icon}</span>{label}
              {id==='adhoc'&&adhocCount>0&&<span style={{marginLeft:'auto',background:'#dc2626',color:'#fff',borderRadius:99,padding:'1px 7px',fontSize:10,fontWeight:900}}>{adhocCount}</span>}
            </button>
          ))}
        </nav>
        <div style={{padding:'10px 12px',borderTop:'1px solid rgba(255,255,255,.08)'}}>
          <div style={{fontWeight:900,fontSize:12,marginBottom:5,color:'rgba(255,255,255,.7)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profile.name}</div>
          <Btn kind="soft" style={{width:'100%',fontSize:12}} onClick={()=>{FDB.addAudit('LOGOUT',profile,{},'info');setProfile(null);}}>⏏ Đăng xuất</Btn>
        </div>
      </aside>

      {/* MAIN CONTENT */}
      <section style={{flex:1,overflow:'auto',background:'#f1f5f9'}}>
        {tab==='dashboard'&&<Dashboard profile={profile} db={db} setTab={setTab}/>}
        {tab==='report'&&!isAdmin&&<ReportForm profile={profile} db={db} toast={toast}/>}
        {tab==='monitoring'&&isAdmin&&<Monitoring db={db} toast={toast} onDBChange={onDBChange}/>}
        {tab==='adhoc'&&<AdhocTab profile={profile} db={db} toast={toast}/>}
        {tab==='indicators'&&isAdmin&&<IndicatorsTab profile={profile} db={db} toast={toast} onDBChange={onDBChange}/>}
        {tab==='taskboard'&&<TaskBoard profile={profile} db={db} toast={toast}/>}
        {tab==='reportout'&&isAdmin&&<AnalyticsReport db={db} toast={toast}/>}
        {tab==='schema'&&isAdmin&&<SchemaBuilder db={db} toast={toast} onDBChange={onDBChange}/>}
        {tab==='audit'&&<AuditLog db={db}/>}
        {tab==='settings'&&isAdmin&&<Settings db={db} toast={toast} onDBChange={onDBChange}/>}
      </section>
      {showHelp&&<SetupHelpModal errorInfo={fbError} onClose={()=>setShowHelp(false)}/>}
      <Toasts list={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
