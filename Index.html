const isOverdue=s=>{const p=parseDMY(s);return p&&p<new Date(new Date().setHours(0,0,0,0))};
const MAX_FILE_BYTES=1024*1024; // 1MB raw (→1.37MB base64) – RTDB không giới hạn 1MB/doc
const MAX_FILES=5;

/* ═══ LOCAL FALLBACK STORAGE (dùng khi không kết nối được Firebase) ═══ */
const LOCAL_FALLBACK_KEY='cong_bao_cao_doan_v31_local_fallback';
function getAtPath(obj,path){
  return path.split('/').filter(Boolean).reduce((o,k)=>(o&&typeof o==='object')?o[k]:undefined,obj);
}
function setAtPath(obj,path,value){
  const parts=path.split('/').filter(Boolean);
  let cur=obj;
  for(let i=0;i<parts.length-1;i++){
    if(typeof cur[parts[i]]!=='object'||cur[parts[i]]===null) cur[parts[i]]={};
    cur=cur[parts[i]];
  }
  const last=parts[parts.length-1];
  if(value===null||value===undefined) delete cur[last];
  else cur[last]=value;
}
const LDB={
  store:null,
  listeners:[],
  init(){
    if(this.store) return;
    try{this.store=JSON.parse(localStorage.getItem(LOCAL_FALLBACK_KEY))||{}}
    catch{this.store={}}
  },
  persist(){try{localStorage.setItem(LOCAL_FALLBACK_KEY,JSON.stringify(this.store))}catch(e){console.warn('localStorage đầy:',e)}},
  notify(path){
    this.listeners.forEach(l=>{
      if(path===l.path||path.startsWith(l.path+'/')||l.path.startsWith(path+'/')||l.path===''){
        l.cb(getAtPath(this.store,l.path));
      }
    });
  },
  get(path){this.init();return getAtPath(this.store,path)},
  set(path,value){this.init();setAtPath(this.store,path,value);this.persist();this.notify(path)},
  del(path){this.init();setAtPath(this.store,path,undefined);this.persist();this.notify(path)},
  push(path,value){
    this.init();
    const key='local_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7);
    const cur=getAtPath(this.store,path)||{};
    cur[key]=value;
    setAtPath(this.store,path,cur);this.persist();this.notify(path);
    return key;
  },
  on(path,cb){
    this.init();
    const entry={path,cb};
    this.listeners.push(entry);
    cb(getAtPath(this.store,path));
    return()=>{this.listeners=this.listeners.filter(l=>l!==entry)};
  },
};

/* ═══ FIREBASE REALTIME DATABASE LAYER (tự chuyển sang LDB khi mất kết nối) ═══ */
// Lấy từ window.* để chắc chắn có thể truy cập sau khi Babel eval
const FDB={
  USE_LOCAL:false,
  get root(){ return window._FB_CLOUD_REF; },

  /* ── utils ── */
  toArr(v){
    if(!v) return[];
    if(Array.isArray(v)) return v.filter(x=>x!=null);
    if(typeof v==='string'){try{const p=JSON.parse(v);return Array.isArray(p)?p.filter(x=>x!=null):[]}catch{return[]}}
    return Object.keys(v).sort((a,b)=>Number(a)-Number(b)||a.localeCompare(b)).map(k=>v[k]).filter(x=>x!=null);
  },
  toMap(v){return(!v||Array.isArray(v))?{}:v},
  parseArr(v,fb){if(!v)return fb;const a=this.toArr(v);return a.length?a:fb},

  /* ── low-level (với timeout để tránh treo vô hạn; tự fallback sang LDB) ── */
  withTimeout(promise,ms=15000,msg='Timeout'){
    return Promise.race([promise, new Promise((_,rej)=>setTimeout(()=>rej(new Error(msg)),ms))]);
  },
  async get(path){
    if(this.USE_LOCAL) return LDB.get(path);
    const s=await this.withTimeout(this.root.child(path).once('value'),12000,'RTDB get timeout');
    return s.val();
  },
  async set(path,data){
    if(this.USE_LOCAL){LDB.set(path,data);return}
    await this.withTimeout(this.root.child(path).set(data),12000,'RTDB set timeout');
  },
  async upd(path,data){
    if(this.USE_LOCAL){const cur=LDB.get(path)||{};LDB.set(path,{...cur,...data});return}
    await this.withTimeout(this.root.child(path).update(data),12000,'RTDB update timeout');
  },
  async del(path){
    if(this.USE_LOCAL){LDB.del(path);return}
    try{await this.root.child(path).remove()}catch(e){console.warn('del err',e)}
  },
  async push(path,data){
    if(this.USE_LOCAL) return LDB.push(path,data);
    const r=await this.withTimeout(this.root.child(path).push(data),12000,'RTDB push timeout');return r.key;
  },
  on(path,cb){
    if(this.USE_LOCAL) return LDB.on(path,cb);
    const ref=this.root.child(path);
    const h=s=>cb(s.val());
    ref.on('value',h,err=>console.warn('RTDB listener err',path,err.code));
    return()=>ref.off('value',h);
  },

  /* ── Kiểm tra kết nối thật sự (không phụ thuộc Rules/Auth) ── */
  async testConnection(){
    return new Promise((resolve,reject)=>{
      if(!window._FB_DB){reject(new Error('Firebase Database chưa được khởi tạo'));return}
      const to=setTimeout(()=>reject(new Error('Timeout 10 giây – kiểm tra kết nối Internet/tường lửa')),10000);
      window._FB_DB.ref('.info/connected').once('value',snap=>{
        clearTimeout(to);
        resolve(snap.val()===true);
      },err=>{clearTimeout(to);reject(err)});
    });
  },

  /* ── Test quyền ghi (Security Rules) ── */
  async testPermission(){
    const testKey=`_ping_${Date.now()}`;
    await this.set(testKey,{t:Date.now(),ok:true});
    await this.del(testKey);
    return true;
  },

  /* ── LOAD ALL ── */
  async loadAll(){
    let raw;
    if(this.USE_LOCAL){LDB.init();raw=LDB.store||{};}
    else{
      const s=await this.withTimeout(this.root.once('value'),15000,'loadAll timeout');
      raw=s.val()||{};
    }
    const cfg=raw.config||{};
    return{
      settings:cfg.settings||{deadlineDay:10,isLocked:false,allowOverride:{},sessionTimeout:45},
      units:cfg.units||null,
      passwords:cfg.passwords||null,
      indicators:this.parseArr(cfg.indicators,null),
      reportSections:this.parseArr(cfg.reportSections,null),
      adhocSections:this.parseArr(cfg.adhocSections,null),
      announcements:this.parseArr(cfg.announcements,[]),
      reports:this.toMap(raw.reports),
      adhocReports:this.toMap(raw.adhocReports),
      tasks:this.toMap(raw.tasks),
      taskProgress:this.toMap(raw.taskProgress),
      audit:this.toArr(raw.audit).slice(-100).reverse(),
    };
  },

  /* ── REAL-TIME LISTENERS ── */
  subscribeAll(cbs){
    return[
      this.on('reports',       v=>cbs.reports(this.toMap(v))),
      this.on('adhocReports',  v=>cbs.adhocReports(this.toMap(v))),
      this.on('tasks',         v=>cbs.tasks(this.toMap(v))),
      this.on('taskProgress',  v=>cbs.taskProgress(this.toMap(v))),
      this.on('config/settings',v=>cbs.settings(v||{})),
    ];
  },

  /* ── REPORTS ── */
  async saveReport(id,{files,...meta}){
    await this.set(`reports/${id}`,{...meta,fileCount:files?.length||0});
    if(files?.length)await this.set(`files/report/${id}`,files);
    else await this.del(`files/report/${id}`);
  },
  async deleteReport(id){await Promise.all([this.del(`reports/${id}`),this.del(`files/report/${id}`)])},
  async getReportFiles(id){return this.toArr(await this.get(`files/report/${id}`))},

  /* ── ADHOC ── */
  async saveAdhoc(id,{files,...meta}){
    await this.set(`adhocReports/${id}`,{...meta,fileCount:files?.length||0});
    if(files?.length)await this.set(`files/adhoc/${id}`,files);
    else await this.del(`files/adhoc/${id}`);
  },
  async deleteAdhoc(id){await Promise.all([this.del(`adhocReports/${id}`),this.del(`files/adhoc/${id}`)])},
  async getAdhocFiles(id){return this.toArr(await this.get(`files/adhoc/${id}`))},

  /* ── TASKS ── */
  async saveTask(id,data){await this.set(`tasks/${id}`,data)},
  async deleteTask(id){await this.del(`tasks/${id}`)},

  /* ── PROGRESS ── */
  async saveProgress(id,{files,...meta}){
    await this.set(`taskProgress/${id}`,{...meta,fileCount:files?.length||0});
    if(files?.length)await this.set(`files/progress/${id}`,files);
    else await this.del(`files/progress/${id}`);
  },
  async getProgressFiles(id){return this.toArr(await this.get(`files/progress/${id}`))},

  /* ── CONFIG ── */
  async saveSettings(s){await this.set('config/settings',s)},
  async saveUnits(u){await this.set('config/units',u)},
  async savePasswords(p){await this.set('config/passwords',p)},
  async saveIndicators(d){await this.set('config/indicators',JSON.stringify(d))},
  async saveReportSections(d){await this.set('config/reportSections',JSON.stringify(d))},
  async saveAdhocSections(d){await this.set('config/adhocSections',JSON.stringify(d))},
  async saveAnnouncements(d){await this.set('config/announcements',JSON.stringify(d))},

  /* ── AUDIT ── */
  async addAudit(action,user,details={},sev='info'){
    try{await this.push('audit',{ts:new Date().toLocaleString('vi-VN'),action,user:user?.name||user?.id||'system',details,sev})}catch(e){console.warn('audit err',e)}
  },
};

/* ═══ FILE HELPERS ═══ */
function readFileB64(file){
  return new Promise((res,rej)=>{
    if(file.size>MAX_FILE_BYTES){rej(new Error(`"${file.name}" vượt quá ${Math.round(MAX_FILE_BYTES/1024)}KB`));return}
    const r=new FileReader();
    r.onload=e=>res({name:file.name,type:file.type,size:file.size,data:e.target.result,addedAt:today()});
    r.onerror=()=>rej(new Error('Không thể đọc file'));
    r.readAsDataURL(file);
  });
}
function dlFile(f){const a=document.createElement('a');a.href=f.data;a.download=f.name;a.click()}
function fIcon(t=''){return t.includes('image')?'🖼️':t.includes('pdf')?'📄':t.includes('word')||t.includes('document')?'📝':t.includes('sheet')||t.includes('excel')?'📊':t.includes('video')?'🎬':'📎'}
function fmtB(b){return b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB'}

/* ═══ FILE UPLOADER ═══ */
function FileUploader({files=[],onChange,label='Đính kèm tài liệu / hình ảnh minh chứng',maxFiles=MAX_FILES}){
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const ref=useRef();
  async function handle(list){
    setErr('');
    if(files.length+list.length>maxFiles){setErr(`Tối đa ${maxFiles} file`);return}
    setLoading(true);
    try{const added=await Promise.all(Array.from(list).map(readFileB64));onChange([...files,...added]);}
    catch(e){setErr(e.message)}
    setLoading(false);
  }
  return(
    <div style={{marginBottom:14}}>
      <label style={{display:'block',fontSize:10,fontWeight:950,color:'#64748b',letterSpacing:.6,textTransform:'uppercase',marginBottom:7}}>{label}</label>
      <div onClick={()=>ref.current?.click()} style={{border:'2px dashed #c7d2fe',borderRadius:12,padding:'14px 18px',background:'#f8fafc',cursor:'pointer',textAlign:'center'}}
        onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor='#6366f1';e.currentTarget.style.background='#eef2ff'}}
        onDragLeave={e=>{e.currentTarget.style.borderColor='#c7d2fe';e.currentTarget.style.background='#f8fafc'}}
        onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor='#c7d2fe';e.currentTarget.style.background='#f8fafc';handle(e.dataTransfer.files)}}>
        <input ref={ref} type="file" multiple style={{display:'none'}} accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg,.mp4,.zip" onChange={e=>handle(e.target.files)}/>
        {loading?<span style={{color:'#6366f1',fontWeight:800}}>⏳ Đang xử lý file…</span>
          :<span style={{color:'#64748b',fontWeight:700,fontSize:13}}>📎 Kéo thả hoặc click để đính kèm · Tối đa {maxFiles} file, mỗi file ≤ {Math.round(MAX_FILE_BYTES/1024)}KB</span>}
      </div>
      {err&&<p style={{color:'#dc2626',fontWeight:800,fontSize:12,marginTop:5}}>{err}</p>}
      {files.length>0&&(
        <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:7}}>
          {files.map((f,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:'#fff',border:'1px solid #e2e8f0',borderRadius:10}}>
              <span style={{fontSize:18}}>{fIcon(f.type)}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:800,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</div>
                <div style={{fontSize:11,color:'#94a3b8',fontWeight:700}}>{fmtB(f.size)} · {f.addedAt}</div>
              </div>
              <Btn kind="soft" style={{padding:'5px 9px',fontSize:11}} onClick={()=>dlFile(f)}>⬇ Tải</Btn>
              <Btn kind="danger" style={{padding:'5px 9px',fontSize:11}} onClick={()=>onChange(files.filter((_,j)=>j!==i))}>✕</Btn>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ═══ DYNAMIC FORM ═══ */
function DynForm({sections,initial={},onSubmit,submitText='Lưu',locked=false,withFiles=false,initialFiles=[]}){
  const [data,setData]=useState(initial);
  const [files,setFiles]=useState(initialFiles);
  const [err,setErr]=useState('');
  const [saving,setSaving]=useState(false);
  const required=sections.flatMap(s=>s.fields.filter(f=>f.required));
  const filled=required.filter(f=>String(data[f.id]||'').trim()).length;
  const pct=Math.round(filled/Math.max(required.length,1)*100);
  const pColor=pct>=100?'#059669':pct>=60?'#d97706':'#dc2626';
  return(
    <div>
      <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:12,padding:13,marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,fontWeight:900,color:'#64748b',marginBottom:6}}>
          <span>Trường bắt buộc</span><span style={{color:pColor}}>{filled}/{required.length} ({pct}%)</span>
        </div>
        <div style={{height:7,background:'#e2e8f0',borderRadius:99,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${pct}%`,background:pColor,transition:'width .4s'}}/>
        </div>
        {err&&<p style={{marginTop:9,color:'#b91c1c',fontWeight:800,fontSize:12}}>{err}</p>}
      </div>
      {sections.map(sec=>(
        <section key={sec.id} style={{marginBottom:20}}>
          <h3 style={{fontSize:13,fontWeight:1000,textTransform:'uppercase',letterSpacing:.4,borderLeft:`5px solid ${sec.color}`,paddingLeft:10,marginBottom:12}}>{sec.title}</h3>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:10}}>
            {sec.fields.map(f=><Field key={f.id} field={f} value={data[f.id]} onChange={v=>setData(d=>({...d,[f.id]:v}))}/>)}
          </div>
        </section>
      ))}
      {withFiles&&<FileUploader files={files} onChange={setFiles} label="Đính kèm minh chứng, hình ảnh, văn bản (PDF, Word, Excel, JPG…)"/>}
      <Btn disabled={locked} loading={saving} onClick={async()=>{
        const miss=required.filter(f=>!String(data[f.id]||'').trim());
        if(miss.length){setErr('Thiếu trường: '+miss.map(f=>f.label).join(', '));return}
        setErr('');setSaving(true);
        try{await onSubmit(data,files);}catch(e){setErr('Lỗi: '+e.message);}
        setSaving(false);
      }}>{submitText}</Btn>
    </div>
  );
}

    setFilesReady(false);setFiles([]);
    if(ex) FDB.getReportFiles(key).then(f=>{setFiles(f);setFilesReady(true);});

  async function onSubmit(data,newFiles){
    const rep={id:key,unitId:profile.id,unitName:profile.name,month:CURRENT_MONTH,status:'submitted',submittedAt:today(),version:(ex?.version||0)+1,data};
    await FDB.saveReport(key,{...rep,files:newFiles||[]});
    await FDB.addAudit('REPORT_SUBMIT',profile,{month:CURRENT_MONTH,version:rep.version},'success');
    toast('success',`Đã lưu báo cáo lên Firebase RTDB · Phiên bản ${rep.version}`);
  }
  if(!filesReady) return<main style={{padding:28,display:'flex',alignItems:'center',justifyContent:'center',height:200}}><div style={{color:'#6366f1',fontWeight:800}}>⏳ Đang tải file đính kèm…</div></main>;
  return(
    <main style={{padding:28,maxWidth:980,margin:'0 auto',width:'100%'}}>
      <h2 style={{fontSize:21,fontWeight:1000}}>📝 Báo cáo định kỳ {fmtMonth(CURRENT_MONTH)}</h2>
      <p style={{fontSize:13,color:'#64748b',fontWeight:700,margin:'5px 0 18px'}}>{profile.name}{ex?` · đã nộp ${ex.submittedAt}, phiên bản ${ex.version}`:''} · 🔥 Firebase RTDB</p>
      {locked&&<Card style={{padding:13,marginBottom:14,background:'#fff7ed',border:'1px solid #fcd34d',color:'#9a3412',fontWeight:800}}>🔒 Hệ thống đang khóa hoặc quá hạn. Admin có thể mở quyền bổ sung.</Card>}
      <Card style={{padding:24}}>
        <DynForm sections={db.reportSections||DEFAULT_REPORT_SECTIONS} initial={ex?.data||{}} initialFiles={files} locked={locked} withFiles submitText={ex?'Cập nhật báo cáo lên Firebase':'Nộp báo cáo lên Firebase'} onSubmit={onSubmit}/>
      </Card>
    </main>
  );
}

/* ═══ ADHOC TAB ═══ */
function AdhocTab({profile,db,toast}){
  const isAdmin=profile.type==='admin';
  const [mode,setMode]=useState('list');
  const [edit,setEdit]=useState(null);
  const [editFiles,setEditFiles]=useState([]);
  const [selUnit,setSelUnit]=useState('');
  const [fileModal,setFileModal]=useState(null);
  const [loadingFiles,setLoadingFiles]=useState(false);
  const units=Object.values(db.units||{}).filter(u=>u.type==='unit');
  const rows=Object.values(db.adhocReports||{}).filter(r=>isAdmin||r.unitId===profile.id).sort((a,b)=>(b.createdTs||0)-(a.createdTs||0));
  useEffect(()=>{if(!selUnit&&units[0])setSelUnit(units[0].id);},[units.length]);

  async function openEdit(r){
    setEdit(r||null);setSelUnit(r?.unitId||units[0]?.id||'');
    if(r?.id){setLoadingFiles(true);const f=await FDB.getAdhocFiles(r.id);setEditFiles(f);setLoadingFiles(false);}
    else setEditFiles([]);
    setMode('form');
  }

  async function saveAdhoc(data,files){
    const id=edit?.id||xid('adhoc');
    const unitId=isAdmin?(selUnit||units[0]?.id):profile.id;
    const rec={id,unitId,unitName:(db.units||{})[unitId]?.name||unitId,month:CURRENT_MONTH,data,status:'submitted',createdAt:today(),createdTs:Date.now(),updatedAt:today()};
    await FDB.saveAdhoc(id,{...rec,files:files||[]});
    await FDB.addAudit('ADHOC_SAVE',profile,{id,unitId},'success');
    toast('success','Đã lưu báo cáo đột xuất lên Firebase RTDB');
    setMode('list');setEdit(null);
  }

  async function viewFiles(r){
    setLoadingFiles(true);const f=await FDB.getAdhocFiles(r.id);setLoadingFiles(false);
    setFileModal({title:`${r.unitName} – ${r.data?.title}`,files:f});
  }

  const uBadge=v=>v==='Khẩn'?{bg:'#fee2e2',c:'#991b1b'}:v==='Quan trọng'?{bg:'#fef3c7',c:'#92400e'}:{bg:'#eef2ff',c:'#4338ca'};

  return(
    <main style={{padding:28,maxWidth:1250,margin:'0 auto',width:'100%'}}>

          <p style={{fontSize:13,color:'#64748b',fontWeight:700}}>Theo dõi công việc phát sinh · Đính kèm file minh chứng · Firebase RTDB realtime</p>

      </div>

      {mode==='form'&&(
        <Card style={{padding:24,marginBottom:18}}>
          {isAdmin&&(
            <div style={{marginBottom:14}}>
              <label style={{fontSize:10,fontWeight:950,color:'#64748b',textTransform:'uppercase',display:'block',marginBottom:7}}>Chi đoàn báo cáo *</label>
              <select value={selUnit} onChange={e=>setSelUnit(e.target.value)} style={{border:'2px solid #e2e8f0',borderRadius:11,padding:'10px 14px',fontWeight:800,fontSize:14,width:'100%',maxWidth:400}}>
                {units.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
              </select>
            </div>
          )}
          {loadingFiles
            ?<div style={{padding:20,color:'#6366f1',fontWeight:800}}>⏳ Đang tải file đính kèm…</div>
            :<DynForm sections={db.adhocSections||DEFAULT_ADHOC_SECTIONS} initial={edit?.data||{urgency:'Thường',start_date:today()}} initialFiles={editFiles} withFiles
                submitText={edit?'Cập nhật báo cáo đột xuất':'Gửi báo cáo đột xuất lên Firebase'} onSubmit={saveAdhoc}/>
          }

      {mode==='list'&&(
        <Card style={{overflow:'hidden'}}>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',minWidth:950}}>
              <thead>
                <tr style={{background:'#f8fafc',borderBottom:'2px solid #eef2f7'}}>
                  {['Chi đoàn','Tên công việc phát sinh','Mức độ','Ngày / Hạn','Kết quả xử lý','File MChứng','Thao tác'].map(h=>(
                    <th key={h} style={{padding:12,textAlign:'left',fontSize:10,textTransform:'uppercase',color:'#64748b',fontWeight:900,whiteSpace:'nowrap'}}>{h}</th>

/* ═══ INDICATORS TAB ═══ */
function IndicatorsTab({profile,db,toast,onDBChange}){
  const [editing,setEditing]=useState(null);
  const [query,setQuery]=useState('');
  const indicators=(db.indicators||[]).filter(i=>!i.year||i.year===CURRENT_YEAR);
  const filtered=query?indicators.filter(i=>`${i.group} ${i.name}`.toLowerCase().includes(query.toLowerCase())):indicators;
  const totalPts=indicators.reduce((a,i)=>a+toN(i.points)+toN(i.bonusPoints),0);
  const units=Object.values(db.units||{}).filter(u=>u.type==='unit');
  const empty={year:CURRENT_YEAR,group:'Khác',name:'',target:1,unit:'việc',points:0,bonusPoints:0,weight:1,autoTask:false,dueDay:25,active:true,evidence:'',scoring:''};

  async function saveInd(){
    if(!editing.name)return toast('error','Vui lòng nhập nội dung chỉ tiêu');
    const id=editing.id||xid('tc');
    const upd=[...(db.indicators||[]).filter(i=>i.id!==id),{...editing,id,year:toN(editing.year||CURRENT_YEAR),target:toN(editing.target||0),points:toN(editing.points||0),bonusPoints:toN(editing.bonusPoints||0),weight:toN(editing.weight||1),dueDay:toN(editing.dueDay||25)}];
    await FDB.saveIndicators(upd);onDBChange('indicators',upd);setEditing(null);toast('success','Đã lưu chỉ tiêu lên Firebase RTDB');
  }
  async function delInd(id){
    if(!confirm('Xóa chỉ tiêu này?'))return;
    const upd=(db.indicators||[]).filter(i=>i.id!==id);
    await FDB.saveIndicators(upd);onDBChange('indicators',upd);toast('warn','Đã xóa chỉ tiêu');
  }
  async function resetDefault(){
    if(!confirm('Reset về 39 tiêu chí theo Quyết định 19-QĐ/BTN ngày 06/4/2026?'))return;
    await FDB.saveIndicators(INDICATORS_2026);onDBChange('indicators',INDICATORS_2026);toast('success','Đã reset 39 tiêu chí');
  }
  async function makeTasks(month=CURRENT_MONTH){
    const[mo,yr]=month.split('_');let cnt=0;
    for(const ind of (db.indicators||[]).filter(i=>i.active&&i.autoTask)){
      const tid=`auto_${ind.id}_${month}`;
      if((db.tasks||{})[tid])continue;
      const due=`${String(toN(ind.dueDay)||25).padStart(2,'0')}/${mo}/${yr}`;
      await FDB.saveTask(tid,{id:tid,title:ind.name.slice(0,80),description:`Thực hiện chỉ tiêu: ${ind.name}.\nMinh chứng: ${ind.evidence||'Theo quy định'}.\nChấm điểm: ${ind.scoring||'Theo bảng điểm'}.`,category:ind.group,priority:toN(ind.points)>=10?'urgent':toN(ind.weight)>=3?'high':'normal',indicatorId:ind.id,autoGenerated:true,assignedTo:units.map(u=>u.id),deadline:due,createdAt:today(),createdBy:'auto',maxScore:toN(ind.points)||100,weight:toN(ind.weight)||1});
      cnt++;
    }
    await FDB.addAudit('AUTO_TASK_CREATE',profile,{month,count:cnt},'success');
    toast('success',`Đã tạo ${cnt} nhiệm vụ tự động từ chỉ tiêu lên Firebase RTDB`);
  }
  function calcProg(ind){
    const reps=Object.values(db.reports||{}).filter(r=>(r.month||'').endsWith(`_${CURRENT_YEAR}`));
    let v=0;
    if(ind.id==='tc28')v=reps.reduce((a,r)=>a+toN(r.data?.party_admitted),0);
    else if(ind.id==='tc36')v=reps.length+Object.values(db.adhocReports||{}).filter(a=>(a.month||'').endsWith(`_${CURRENT_YEAR}`)).length;
    else v=Object.values(db.taskProgress||{}).filter(p=>(db.tasks||{})[p.taskId]?.indicatorId===ind.id&&['submitted','reviewed'].includes(p.status)).length;
    return{v,pct:Math.min(100,Math.round(v/Math.max(toN(ind.target),1)*100))};
  }
  const groups=[...new Set(filtered.map(i=>i.group))];
  return(
    <main style={{padding:28,maxWidth:1500,margin:'0 auto',width:'100%'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18,gap:12,flexWrap:'wrap'}}>
        <div>
          <h2 style={{fontSize:21,fontWeight:1000}}>🎯 Bảng điểm thi đua công tác Đoàn {CURRENT_YEAR}</h2>
          <p style={{fontSize:13,color:'#64748b',fontWeight:700}}>39 tiêu chí · Tổng <b style={{color:'#4f46e5'}}>{totalPts}</b> điểm · Quyết định số 19-QĐ/BTN ngày 06/4/2026 · 🔥 Firebase RTDB</p>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <Btn kind="soft" onClick={()=>setEditing(empty)}>➕ Thêm chỉ tiêu</Btn>
          <Btn kind="warn" onClick={resetDefault}>↺ Reset theo QĐ</Btn>
          <Btn onClick={()=>makeTasks(CURRENT_MONTH)}>⚙️ Tạo giao việc tháng này</Btn>
        </div>
      </div>
      <Card style={{padding:12,marginBottom:13}}>
        <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="🔎 Tìm theo nhóm hoặc nội dung tiêu chí…" style={{width:'100%',padding:10,border:'2px solid #e2e8f0',borderRadius:10,fontWeight:750,fontSize:13}}/>
      </Card>
      {editing&&(
        <Card style={{padding:22,marginBottom:16,border:'2px solid #c7d2fe'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <h3 style={{fontWeight:1000,fontSize:16}}>{editing.id?'✏ Sửa chỉ tiêu':'➕ Thêm chỉ tiêu mới'}</h3>
            <Btn kind="soft" onClick={()=>setEditing(null)}>✕</Btn>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(175px,1fr))',gap:11,marginBottom:11}}>
            {[{id:'year',l:'Năm',t:'number'},{id:'group',l:'Nhóm chỉ tiêu',t:'text'},{id:'target',l:'Mức chỉ tiêu',t:'number'},{id:'unit',l:'Đơn vị tính',t:'text'},{id:'points',l:'Điểm tối đa',t:'number'},{id:'bonusPoints',l:'Điểm cộng',t:'number'},{id:'weight',l:'Trọng số',t:'number'},{id:'dueDay',l:'Hạn ngày/tháng',t:'number'}].map(f=>(
              <Field key={f.id} field={{label:f.l,type:f.t}} value={editing[f.id]} onChange={v=>setEditing({...editing,[f.id]:v})}/>
            ))}
            <div style={{display:'flex',gap:14,flexWrap:'wrap',alignItems:'center',paddingTop:10}}>
              <label style={{display:'flex',gap:7,alignItems:'center',fontWeight:850,cursor:'pointer'}}><input type="checkbox" checked={!!editing.autoTask} onChange={e=>setEditing({...editing,autoTask:e.target.checked})}/> Tự giao việc</label>
              <label style={{display:'flex',gap:7,alignItems:'center',fontWeight:850,cursor:'pointer'}}><input type="checkbox" checked={editing.active!==false} onChange={e=>setEditing({...editing,active:e.target.checked})}/> Đang áp dụng</label>
            </div>
          </div>
          <Field field={{label:'Nội dung, điều kiện đánh giá *',type:'textarea'}} value={editing.name} onChange={v=>setEditing({...editing,name:v})}/>
          <Field field={{label:'Yêu cầu minh chứng',type:'textarea'}} value={editing.evidence} onChange={v=>setEditing({...editing,evidence:v})}/>
          <Field field={{label:'Nguyên tắc chấm điểm',type:'textarea'}} value={editing.scoring} onChange={v=>setEditing({...editing,scoring:v})}/>
          <Btn onClick={saveInd}>💾 Lưu lên Firebase RTDB</Btn>
        </Card>
      )}
      {groups.map(g=>{
        const gInds=filtered.filter(i=>i.group===g);
        const gPts=gInds.reduce((a,i)=>a+toN(i.points)+toN(i.bonusPoints),0);
        return(
          <div key={g} style={{marginBottom:20}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:9}}>
              <h3 style={{fontWeight:1000,fontSize:15}}>{g}</h3>
              <Badge bg="#ede9fe" color="#5b21b6">{gPts} điểm</Badge>
              <Badge bg="#f1f5f9" color="#64748b">{gInds.length} tiêu chí</Badge>
            </div>
            <Card style={{overflow:'hidden'}}>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',minWidth:1200}}>
                  <thead>
                    <tr style={{background:'#f8fafc',borderBottom:'2px solid #eef2f7'}}>
                      {['Mã','Nội dung','Điểm','Mức năm','Đã đạt','%','Minh chứng','Nguyên tắc chấm','Tự giao','Thao tác'].map(h=>(
                        <th key={h} style={{padding:10,textAlign:'left',fontSize:10,textTransform:'uppercase',color:'#64748b',whiteSpace:'nowrap',fontWeight:900}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {gInds.map(ind=>{
                      const{v,pct}=calcProg(ind);
                      const pColor=pct>=90?'#059669':pct>=60?'#d97706':'#dc2626';
                      return(
                        <tr key={ind.id} style={{borderBottom:'1px solid #f1f5f9',verticalAlign:'top'}}>
                          <td style={{padding:10,fontWeight:900,fontSize:11,color:'#6366f1'}}>{ind.id}</td>
                          <td style={{padding:10,minWidth:280,lineHeight:1.5,fontWeight:750,fontSize:13}}>{ind.name}</td>
                          <td style={{padding:10,fontWeight:1000,color:'#4f46e5',whiteSpace:'nowrap'}}>{ind.points}{ind.bonusPoints?<span style={{color:'#059669'}}>+{ind.bonusPoints}</span>:''}</td>
                          <td style={{padding:10,whiteSpace:'nowrap',fontWeight:800}}>{ind.target} {ind.unit}</td>
                          <td style={{padding:10,fontWeight:900}}>{v}</td>
                          <td style={{padding:10,minWidth:120}}>
                            <div style={{display:'flex',alignItems:'center',gap:6}}>
                              <div style={{flex:1,height:6,background:'#f1f5f9',borderRadius:99,overflow:'hidden'}}><div style={{height:'100%',width:`${pct}%`,background:pColor}}/></div>
                              <span style={{fontSize:11,fontWeight:900,color:pColor,flexShrink:0}}>{pct}%</span>
                            </div>
                          </td>
                          <td style={{padding:10,fontSize:12,maxWidth:180,lineHeight:1.4}}>{ind.evidence||'—'}</td>
                          <td style={{padding:10,fontSize:12,maxWidth:180,lineHeight:1.4}}>{ind.scoring||'—'}</td>
                          <td style={{padding:10}}>{ind.autoTask?<Badge bg="#dcfce7" color="#166534">Có</Badge>:<Badge bg="#f1f5f9" color="#64748b">Không</Badge>}</td>
                          <td style={{padding:10}}>
                            <div style={{display:'flex',gap:4}}>
                              <Btn kind="soft" style={{padding:'5px 8px',fontSize:11}} onClick={()=>setEditing(ind)}>✏</Btn>
                              <Btn kind="danger" style={{padding:'5px 8px',fontSize:11}} onClick={()=>delInd(ind.id)}>🗑</Btn>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </Card>
          </div>
        );
      })}
    </main>
  );
}

/* ═══ TASK BOARD ═══ */
function TaskBoard({profile,db,toast}){
  const isAdmin=profile.type==='admin';
  const units=Object.values(db.units||{}).filter(u=>u.type==='unit');
  const tasks=Object.values(db.tasks||{}).sort((a,b)=>(isOverdue(b.deadline)?1:0)-(isOverdue(a.deadline)?1:0));
  const rows=isAdmin?tasks:tasks.filter(t=>t.assignedTo?.includes(profile.id));
  const [form,setForm]=useState(null);
  const [prog,setProg]=useState(null);
  const [progFiles,setProgFiles]=useState([]);
  const [fileModal,setFileModal]=useState(null);

  async function createTask(){
    if(!form.title)return toast('error','Nhập tên công việc');
    const id=xid('task');
    await FDB.saveTask(id,{...form,id,assignedTo:form.assignedTo?.length?form.assignedTo:units.map(u=>u.id),createdAt:today(),createdBy:profile.id,maxScore:100,weight:toN(form.weight||1)});
    await FDB.addAudit('TASK_CREATE',profile,{id,title:form.title},'info');
    toast('success','Đã tạo và giao việc lên Firebase RTDB');setForm(null);
  }

  async function openProg(task){
    const myP=(db.taskProgress||{})[`${task.id}_${profile.id}`];
    const files=myP?.fileCount>0?await FDB.getProgressFiles(`${task.id}_${profile.id}`):[];
    setProgFiles(files);
    setProg({task,status:myP?.status||'inprogress',progress:myP?.progress||0,note:myP?.note||''});
  }

  async function saveProgress(files){
    if(!prog)return;
    const key=`${prog.task.id}_${profile.id}`;
    const ex=(db.taskProgress||{})[key]||{};
    await FDB.saveProgress(key,{...ex,id:key,taskId:prog.task.id,unitId:profile.id,unitName:profile.name,status:prog.status,progress:toN(prog.progress||0),note:prog.note,files:files||[],updatedAt:today(),submittedAt:prog.status==='submitted'?today():ex.submittedAt});
    await FDB.addAudit('TASK_PROGRESS',profile,{taskId:prog.task.id,status:prog.status},'info');
    toast('success','Đã cập nhật tiến độ lên Firebase RTDB');setProg(null);
  }

  async function score(task,uid,scoreVal){
    const key=`${task.id}_${uid}`;
    const ex=(db.taskProgress||{})[key]||{};
    await FDB.saveProgress(key,{...ex,id:key,taskId:task.id,unitId:uid,status:'reviewed',score:toN(scoreVal),feedback:'Đã đánh giá',updatedAt:today(),files:[]});
    toast('success','Đã chấm điểm');
  }

  async function viewProgFiles(taskId,uid,unitName){
    const key=`${taskId}_${uid}`;
    const f=await FDB.getProgressFiles(key);
    setFileModal({title:`${unitName} – File minh chứng`,files:f});
  }

  const pColor=p=>p===100?'#059669':p>50?'#4f46e5':'#f59e0b';
  const stMap={assigned:{l:'Đã giao',bg:'#f1f5f9',c:'#64748b'},inprogress:{l:'Đang thực hiện',bg:'#fef3c7',c:'#92400e'},submitted:{l:'Đã nộp BC',bg:'#dcfce7',c:'#166534'},reviewed:{l:'Đã đánh giá',bg:'#ede9fe',c:'#5b21b6'}};

  return(
    <main style={{padding:28,maxWidth:1400,margin:'0 auto',width:'100%'}}>
      {fileModal&&<FileModal title={fileModal.title} files={fileModal.files} onClose={()=>setFileModal(null)}/>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18,gap:12}}>
        <div>
          <h2 style={{fontSize:21,fontWeight:1000}}>{isAdmin?'📌 Quản lý giao việc':'📌 Công việc được giao'}</h2>
          <p style={{fontSize:13,color:'#64748b',fontWeight:700}}>Theo dõi tiến độ · Đính kèm file minh chứng · Chấm điểm · 🔥 Firebase RTDB</p>
        </div>
        {isAdmin&&<Btn onClick={()=>setForm({title:'',description:'',category:'Công tác Đoàn',priority:'normal',deadline:'',assignedTo:units.map(u=>u.id),weight:1})}>➕ Tạo việc</Btn>}
      </div>

      {form&&(
        <Card style={{padding:22,marginBottom:20}}>
          <h3 style={{fontWeight:1000,marginBottom:14}}>Tạo công việc mới</h3>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(210px,1fr))',gap:11}}>
            {[{id:'title',l:'Tên công việc *',t:'text'},{id:'category',l:'Danh mục',t:'text'},{id:'deadline',l:'Hạn hoàn thành (dd/mm/yyyy)',t:'text'},{id:'priority',l:'Ưu tiên (urgent/high/normal)',t:'text'},{id:'weight',l:'Trọng số',t:'number'}].map(f=>(
              <Field key={f.id} field={{label:f.l,type:f.t}} value={form[f.id]} onChange={v=>setForm({...form,[f.id]:v})}/>
            ))}
          </div>
          <Field field={{label:'Mô tả yêu cầu chi tiết',type:'textarea'}} value={form.description} onChange={v=>setForm({...form,description:v})}/>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:10,fontWeight:950,color:'#64748b',textTransform:'uppercase',display:'block',marginBottom:9}}>Giao cho chi đoàn</label>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {units.map(u=>(
                <label key={u.id} style={{display:'flex',alignItems:'center',gap:7,padding:'8px 13px',borderRadius:99,background:form.assignedTo?.includes(u.id)?'#eef2ff':'#f8fafc',border:`1px solid ${form.assignedTo?.includes(u.id)?'#6366f1':'#e2e8f0'}`,cursor:'pointer',fontWeight:800,fontSize:12}}>
                  <input type="checkbox" checked={form.assignedTo?.includes(u.id)||false} onChange={e=>setForm({...form,assignedTo:e.target.checked?[...(form.assignedTo||[]),u.id]:(form.assignedTo||[]).filter(x=>x!==u.id)})}/>
                  {u.name}
                </label>
              ))}
            </div>
          </div>
          <div style={{display:'flex',gap:8}}><Btn onClick={createTask}>✓ Tạo & Giao việc lên Firebase</Btn><Btn kind="soft" onClick={()=>setForm(null)}>Hủy</Btn></div>
        </Card>
      )}

      <div style={{display:'grid',gap:16}}>
        {rows.map(t=>{
          const assigned=t.assignedTo||[];
          const progs=assigned.map(u=>({uid:u,p:(db.taskProgress||{})[`${t.id}_${u}`]||null}));
          const done=progs.filter(({p})=>['submitted','reviewed'].includes(p?.status)).length;
          const avgProg=assigned.length?Math.round(progs.reduce((a,{p})=>a+(p?.progress||0),0)/assigned.length):0;
          const myP=(db.taskProgress||{})[`${t.id}_${profile.id}`];
          const isLate=isOverdue(t.deadline)&&done<assigned.length;
          return(
            <Card key={t.id} style={{padding:22,borderLeft:`5px solid ${isLate?'#dc2626':t.autoGenerated?'#7c3aed':'#4f46e5'}`}}>
              <div style={{display:'flex',justifyContent:'space-between',gap:16,flexWrap:'wrap',marginBottom:14}}>
                <div style={{flex:1,minWidth:260}}>
                  <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:6}}>
                    <h3 style={{fontSize:16,fontWeight:1000}}>{t.title}</h3>
                    {t.autoGenerated&&<Badge bg="#ede9fe" color="#5b21b6">⚙ Từ chỉ tiêu</Badge>}
                    {isLate&&<Badge bg="#fee2e2" color="#991b1b">⚠ Quá hạn</Badge>}
                  </div>
                  <p style={{fontSize:13,color:'#475569',lineHeight:1.6,marginBottom:8,maxWidth:680,whiteSpace:'pre-line'}}>{t.description}</p>
                  <div style={{display:'flex',gap:14,fontSize:12,color:'#64748b',fontWeight:800,flexWrap:'wrap'}}>
                    <span>📅 Hạn: <b style={{color:isLate?'#dc2626':'#0f172a'}}>{t.deadline||'—'}</b></span>
                    <span>📂 {t.category}</span><span>⚖ Trọng số: {t.weight}</span>
                    <span>✅ Hoàn thành: {done}/{assigned.length}</span>
                  </div>
                  <div style={{marginTop:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:11,fontWeight:800,color:'#64748b',marginBottom:4}}>
                      <span>Tiến độ trung bình</span><span style={{color:pColor(avgProg)}}>{avgProg}%</span>
                    </div>
                    <div style={{height:7,background:'#f1f5f9',borderRadius:99,overflow:'hidden'}}><div style={{height:'100%',width:`${avgProg}%`,background:pColor(avgProg),transition:'width .5s'}}/></div>
                  </div>
                </div>
                {!isAdmin&&<Btn onClick={()=>openProg(t)}>{myP?'✏ Cập nhật':'📤 Báo cáo tiến độ'}</Btn>}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(215px,1fr))',gap:10}}>
                {progs.map(({uid,p})=>{
                  const unit=(db.units||{})[uid];
                  const st=stMap[p?.status||'assigned']||stMap.assigned;
                  return(
                    <div key={uid} style={{background:'#f8fafc',borderRadius:12,padding:11,border:'1px solid #eef2f7'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                        <b style={{fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{unit?.name||uid}</b>
                        <Badge bg={st.bg} color={st.c}>{st.l}</Badge>
                      </div>
                      <div style={{height:5,background:'#e2e8f0',borderRadius:99,overflow:'hidden',marginBottom:5}}><div style={{height:'100%',width:`${p?.progress||0}%`,background:pColor(p?.progress||0)}}/></div>
                      <div style={{fontSize:11,color:'#64748b',fontWeight:800,marginBottom:4}}>{p?.progress||0}%{p?.score!=null?` · ⭐ ${p.score}đ`:''}</div>
                      {p?.note&&<div style={{fontSize:11,color:'#374151',lineHeight:1.5,marginBottom:5}}>{p.note.slice(0,70)}{p.note.length>70?'…':''}</div>}
                      {(p?.fileCount||0)>0&&(
                        <button onClick={()=>viewProgFiles(t.id,uid,unit?.name||uid)} style={{background:'#eff6ff',border:'none',borderRadius:7,padding:'4px 9px',fontSize:11,color:'#2563eb',fontWeight:800,cursor:'pointer',width:'100%',textAlign:'left'}}>
                          📎 {p.fileCount} file minh chứng
                        </button>
                      )}
                      {isAdmin&&(
                        <div style={{display:'flex',gap:5,marginTop:7,alignItems:'center'}}>
                          <input type="number" placeholder="Điểm" min="0" max="100" defaultValue={p?.score??''} style={{width:65,padding:'5px 7px',border:'1px solid #cbd5e1',borderRadius:7,fontSize:12,fontWeight:800}}
                            onKeyDown={e=>{if(e.key==='Enter'&&e.currentTarget.value)score(t,uid,e.currentTarget.value)}}/>
                          <span style={{fontSize:9,color:'#94a3b8',fontWeight:700}}>Enter lưu</span>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </Card>
          );
        })}
        {rows.length===0&&<Card style={{padding:40,textAlign:'center',color:'#94a3b8',fontWeight:850}}>Chưa có công việc nào. {isAdmin&&'Nhấn "Tạo việc" hoặc vào tab Chỉ tiêu năm → Tạo giao việc tự động.'}</Card>}
      </div>

      {/* Progress Modal */}
      {prog&&(
        <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,.65)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <Card style={{padding:28,maxWidth:600,width:'100%',maxHeight:'90vh',overflow:'auto'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <h3 style={{fontSize:18,fontWeight:1000}}>📤 Cập nhật tiến độ</h3>
              <Btn kind="soft" style={{padding:'5px 11px'}} onClick={()=>setProg(null)}>✕</Btn>
            </div>
            <p style={{fontSize:13,color:'#64748b',fontWeight:700,marginBottom:16}}>{prog.task.title}</p>
            <div style={{marginBottom:13}}>
              <label style={{fontSize:10,fontWeight:950,color:'#64748b',textTransform:'uppercase',display:'block',marginBottom:7}}>Tiến độ: {prog.progress}%</label>
              <input type="range" min={0} max={100} step={5} value={prog.progress} onChange={e=>setProg({...prog,progress:toN(e.target.value)})} style={{width:'100%',accentColor:'#6366f1'}}/>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#94a3b8',marginTop:3}}><span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span></div>
            </div>
            <div style={{display:'flex',gap:9,marginBottom:13,flexWrap:'wrap'}}>
              {['inprogress','submitted'].map(s=>(
                <button key={s} onClick={()=>setProg({...prog,status:s})}
                  style={{padding:'8px 14px',border:`2px solid ${prog.status===s?'#6366f1':'#e2e8f0'}`,borderRadius:10,background:prog.status===s?'#eef2ff':'#f8fafc',color:prog.status===s?'#4338ca':'#64748b',fontWeight:800,fontSize:13}}>
                  {s==='submitted'?'📤 Đã hoàn thành và nộp':'⚙ Đang thực hiện'}
                </button>
              ))}
            </div>
            <Field field={{label:'Báo cáo kết quả / ghi chú chi tiết',type:'textarea'}} value={prog.note} onChange={v=>setProg({...prog,note:v})}/>
            <FileUploader files={progFiles} onChange={setProgFiles} label="Đính kèm file minh chứng (PDF, Word, Excel, Ảnh…)"/>
            <div style={{display:'flex',gap:9}}>
              <Btn loading={false} onClick={()=>saveProgress(progFiles)}
                style={{background:prog.status==='submitted'?'linear-gradient(135deg,#059669,#047857)':'linear-gradient(135deg,#4f46e5,#7c3aed)'}}>
                {prog.status==='submitted'?'✓ Nộp hoàn thành lên Firebase':'💾 Lưu tiến độ lên Firebase'}
              </Btn>
              <Btn kind="soft" onClick={()=>setProg(null)}>Hủy</Btn>
            </div>
          </Card>
        </div>
      )}
    </main>
  );
}

/* ═══ ANALYTICS REPORT ═══ */
function AnalyticsReport({db,toast}){
  const [month,setMonth]=useState(CURRENT_MONTH);
  const units=Object.values(db.units||{}).filter(u=>u.type==='unit');
  const reps=Object.values(db.reports||{}).filter(r=>r.month===month);
  const adhocs=Object.values(db.adhocReports||{}).filter(a=>a.month===month);
  const indRows=(db.indicators||[]).filter(i=>i.active).map(i=>{
    let v=0;
    if(i.id==='tc28')v=reps.reduce((a,r)=>a+toN(r.data?.party_admitted),0);
    else if(i.id==='tc36')v=reps.length+adhocs.length;
    else v=Object.values(db.taskProgress||{}).filter(p=>(db.tasks||{})[p.taskId]?.indicatorId===i.id&&['submitted','reviewed'].includes(p.status)).length;
    return{...i,v,pct:Math.min(100,Math.round(v/Math.max(toN(i.target),1)*100))};
  });
  const totalPts=indRows.reduce((a,i)=>a+toN(i.points)+toN(i.bonusPoints),0);
  const earnedPts=indRows.filter(i=>i.pct>=100).reduce((a,i)=>a+toN(i.points),0)+indRows.filter(i=>i.pct>=70&&i.pct<100).reduce((a,i)=>a+Math.floor(toN(i.points)/2),0);
  const needs=indRows.filter(i=>i.pct<70).map(i=>`Tập trung nâng tỷ lệ chỉ tiêu "${i.name.slice(0,65)}", đạt ${i.v}/${i.target} ${i.unit} (${i.pct}%).`);
  function exportTXT(){const t=document.getElementById('rpt-out')?.innerText||'';const b=new Blob([t],{type:'text/plain;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`BaoCaoTongHop_${month}.txt`;a.click();toast('success','Đã xuất TXT');}
  return(
    <main style={{padding:28,maxWidth:1060,margin:'0 auto',width:'100%'}}>
      <div className="no-print" style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:12}}>
        <div><h2 style={{fontSize:21,fontWeight:1000}}>📄 Xuất báo cáo tổng hợp</h2><p style={{fontSize:13,color:'#64748b',fontWeight:700}}>Tình hình ĐV · kết quả chi đoàn · 39 chỉ tiêu thi đua · nội dung tháng tới</p></div>
        <div style={{display:'flex',gap:9}}>
          <select value={month} onChange={e=>setMonth(e.target.value)} style={{border:'2px solid #e2e8f0',borderRadius:10,padding:'9px 13px',fontWeight:850,fontSize:13}}>
            {MONTHS.map(m=><option key={m} value={m}>{fmtMonth(m)}</option>)}
          </select>
          <Btn kind="soft" onClick={()=>window.print()}>🖨 In / PDF</Btn>
          <Btn onClick={exportTXT}>📥 Xuất TXT</Btn>
        </div>
      </div>
      <Card className="print-page" style={{padding:40}}>
        <article id="rpt-out" style={{fontFamily:'Times New Roman,serif',fontSize:15,lineHeight:1.7,color:'#111827'}}>
          <div style={{textAlign:'center',marginBottom:22,borderBottom:'2px solid #e2e8f0',paddingBottom:14}}>
            <b style={{fontSize:13}}>ĐOÀN TNCS HỒ CHÍ MINH CÔNG AN TỈNH LÂM ĐỒNG</b><br/>
            <b style={{fontSize:20}}>BÁO CÁO TỔNG HỢP KẾT QUẢ CÔNG TÁC ĐOÀN</b><br/>
            <span style={{fontSize:16}}>{fmtMonth(month)}</span>
            <div style={{marginTop:7,fontSize:12,color:'#64748b'}}>Xuất ngày {today()} · Hệ thống Cổng Báo Cáo Đoàn v{APP_VERSION} · Firebase RTDB</div>
          </div>
          <h3 style={{fontSize:16,fontWeight:900,marginBottom:7,color:'#1e40af'}}>I. TÌNH HÌNH ĐOÀN VIÊN</h3>
          <p>Tổng hợp <b>{reps.length}/{units.length}</b> chi đoàn đã nộp báo cáo {fmtMonth(month)}. Tổng đoàn viên: <b>{reps.reduce((a,r)=>a+toN(r.data?.total_members),0)}</b>; đảng viên sinh hoạt Đoàn: <b>{reps.reduce((a,r)=>a+toN(r.data?.party_members),0)}</b>; đoàn viên mới: <b>{reps.reduce((a,r)=>a+toN(r.data?.new_members),0)}</b>; kết nạp Đảng: <b>{reps.reduce((a,r)=>a+toN(r.data?.party_admitted),0)}</b>; chuyển Đảng chính thức: <b>{reps.reduce((a,r)=>a+toN(r.data?.party_official),0)}</b>.</p>
          {units.filter(u=>!reps.find(r=>r.unitId===u.id)).length>0&&<p style={{color:'#dc2626',fontWeight:800}}>⚠ Chưa nộp: {units.filter(u=>!reps.find(r=>r.unitId===u.id)).map(u=>u.name).join(', ')}.</p>}
          <h3 style={{fontSize:16,fontWeight:900,marginTop:20,marginBottom:7,color:'#065f46'}}>II. KẾT QUẢ ĐẠT ĐƯỢC THEO NỘI DUNG CÁC CHI ĐOÀN BÁO CÁO</h3>
          {reps.length>0?reps.map(r=>(
            <div key={r.id} style={{marginBottom:13,paddingLeft:14,borderLeft:'4px solid #6366f1'}}>
              <p><b style={{fontSize:15}}>{r.unitName}</b> <span style={{fontSize:12,color:'#64748b'}}>(nộp {r.submittedAt}{r.fileCount>0?` · 📎 ${r.fileCount} file minh chứng`:''})</span></p>
              <p><i>Hoạt động nổi bật:</i> {safe(r.data?.highlight_activity)}</p>
              <p><i>Giáo dục chính trị:</i> {safe(r.data?.political_education).slice(0,250)}</p>
              <p><i>Phong trào tình nguyện:</i> {safe(r.data?.movement_result).slice(0,250)}</p>
              <p><i>Xây dựng Đoàn:</i> {safe(r.data?.union_building).slice(0,200)}</p>
            </div>
          )):<p style={{color:'#dc2626'}}>Chưa có báo cáo trong tháng này.</p>}
          <h3 style={{fontSize:16,fontWeight:900,marginTop:20,marginBottom:7,color:'#991b1b'}}>III. CÔNG VIỆC PHÁT SINH – BÁO CÁO ĐỘT XUẤT</h3>
          {adhocs.length>0?adhocs.map(a=>(
            <div key={a.id} style={{marginBottom:11,paddingLeft:14,borderLeft:'4px solid #dc2626'}}>
              <p><b>{a.unitName}</b> – <b>{a.data?.title}</b> <span style={{background:'#fee2e2',color:'#991b1b',padding:'2px 7px',borderRadius:99,fontSize:11,fontWeight:900}}>{a.data?.urgency}</span>{a.fileCount>0?<span style={{fontSize:12,color:'#4f46e5'}}> · 📎 {a.fileCount} file</span>:''}</p>
              <p><i>Nội dung:</i> {safe(a.data?.content).slice(0,250)}</p>
              <p><i>Kết quả:</i> {safe(a.data?.result).slice(0,250)}</p>
            </div>
          )):<p>Trong tháng chưa có nội dung phát sinh.</p>}
          <h3 style={{fontSize:16,fontWeight:900,marginTop:20,marginBottom:7,color:'#5b21b6'}}>IV. ĐỐI CHIẾU BẢNG ĐIỂM THI ĐUA CÔNG TÁC ĐOÀN NĂM {CURRENT_YEAR}</h3>
          <p style={{marginBottom:9}}>Ước tính điểm thi đua đến {fmtMonth(month)}: <b style={{color:'#4f46e5',fontSize:16}}>{earnedPts}/{totalPts}</b> điểm ({Math.round(earnedPts/Math.max(totalPts,1)*100)}%).</p>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead><tr style={{background:'#f1f5f9'}}>{['STT','Nội dung','Điểm','Mức năm','Kết quả','Tỷ lệ','Nguyên tắc chấm'].map(h=><th key={h} style={{border:'1px solid #cbd5e1',padding:'6px 8px',textAlign:'left',fontWeight:900}}>{h}</th>)}</tr></thead>
              <tbody>{indRows.map((i,idx)=>(
                <tr key={i.id} style={{background:i.pct>=100?'#f0fdf4':i.pct>=60?'#fffbeb':i.pct>0?'#fff7ed':'#fff'}}>
                  <td style={{border:'1px solid #e2e8f0',padding:'5px 8px',fontWeight:900,color:'#6366f1'}}>{idx+1}</td>
                  <td style={{border:'1px solid #e2e8f0',padding:'5px 8px'}}>{i.name}</td>
                  <td style={{border:'1px solid #e2e8f0',padding:'5px 8px',fontWeight:900,color:'#4f46e5'}}>{i.points}{i.bonusPoints?`+${i.bonusPoints}`:''}</td>
                  <td style={{border:'1px solid #e2e8f0',padding:'5px 8px',whiteSpace:'nowrap'}}>{i.target} {i.unit}</td>
                  <td style={{border:'1px solid #e2e8f0',padding:'5px 8px',fontWeight:900}}>{i.v}</td>
                  <td style={{border:'1px solid #e2e8f0',padding:'5px 8px',fontWeight:900,color:i.pct>=90?'#059669':i.pct>=60?'#d97706':'#dc2626'}}>{i.pct}%</td>
                  <td style={{border:'1px solid #e2e8f0',padding:'5px 8px',fontSize:11}}>{i.scoring||'—'}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
          <h3 style={{fontSize:16,fontWeight:900,marginTop:20,marginBottom:7}}>V. NHẬN XÉT, ĐÁNH GIÁ CHUNG</h3>
          <p><b>Ưu điểm:</b> {reps.length>=units.length?'Các chi đoàn đã nộp báo cáo đầy đủ, đúng hạn.':'Một số chi đoàn chưa hoàn thành nộp báo cáo định kỳ.'}{adhocs.length?` Tháng này phát sinh ${adhocs.length} báo cáo đột xuất được cập nhật kịp thời.`:''}</p>
          {reps.filter(r=>r.data?.pros).length>0&&<p>{reps.map(r=>r.data?.pros).filter(Boolean).join(' ').slice(0,500)}</p>}
          <p><b>Hạn chế:</b> {reps.filter(r=>r.data?.cons).length>0?reps.map(r=>r.data?.cons).filter(Boolean).join(' ').slice(0,400):'Không có ghi nhận hạn chế đặc biệt.'}</p>
          <h3 style={{fontSize:16,fontWeight:900,marginTop:20,marginBottom:7,color:'#dc2626'}}>VI. NỘI DUNG CẦN THỰC HIỆN TRONG THÁNG TIẾP THEO</h3>
          {(needs.length?needs:['Tiếp tục duy trì nộp báo cáo đúng hạn và cập nhật đầy đủ minh chứng, số liệu định lượng.','Bám sát 39 tiêu chí bảng điểm thi đua năm, đặc biệt các tiêu chí điểm cao và trọng số lớn.','Đảm bảo hoàn thành các chỉ tiêu do Đoàn cấp trên phân bổ và nhiệm vụ cấp ủy giao.']).map((nx,i)=><p key={i}>{i+1}. {nx}</p>)}
          {reps.map(r=>r.data?.plan_next).filter(Boolean).length>0&&<>

/* ═══ MONITORING ═══ */
function Monitoring({db,toast,onDBChange}){
  const [month,setMonth]=useState(CURRENT_MONTH);
  const [edit,setEdit]=useState(null);
  const [editFiles,setEditFiles]=useState([]);
  const units=Object.values(db.units||{}).filter(u=>u.type==='unit');
  const rows=units.map(u=>({u,rep:(db.reports||{})[`${u.id}_${month}`],adhocs:Object.values(db.adhocReports||{}).filter(a=>a.unitId===u.id&&a.month===month)}));

  async function openEdit(u,rep){
    setEdit({u,rep});
    const f=rep?await FDB.getReportFiles(`${u.id}_${month}`):[]; setEditFiles(f);
  }

  async function adminSave(data,files){
    if(!edit)return;
    const key=`${edit.u.id}_${month}`;const ex=edit.rep;
    const rep={id:key,unitId:edit.u.id,unitName:edit.u.name,month,status:'submitted',submittedAt:ex?.submittedAt||today(),adminEditedAt:today(),adminEdited:true,version:(ex?.version||0)+1,data};
    await FDB.saveReport(key,{...rep,files:files||[]});
    await FDB.addAudit('ADMIN_EDIT',{id:'admin',name:'Admin'},{unitId:edit.u.id,month},'warning');
    toast('success','Admin đã cập nhật báo cáo lên Firebase RTDB');setEdit(null);
  }
  async function resetRep(uid){if(!confirm('Xóa báo cáo định kỳ của chi đoàn này?'))return;await FDB.deleteReport(`${uid}_${month}`);toast('warn','Đã xóa báo cáo');}
  async function resetAdhoc(uid){if(!confirm('Xóa tất cả báo cáo đột xuất tháng này?'))return;const del=Object.values(db.adhocReports||{}).filter(a=>a.unitId===uid&&a.month===month);for(const a of del)await FDB.deleteAdhoc(a.id);toast('warn','Đã xóa báo cáo đột xuất');}
  async function toggleOverride(uid){const s={...db.settings,allowOverride:{...(db.settings?.allowOverride||{}),[uid]:!(db.settings?.allowOverride||{})[uid]}};await FDB.saveSettings(s);onDBChange('settings',s);toast('success','Đã cập nhật quyền bổ sung');}

    <main style={{padding:28,maxWidth:1400,margin:'0 auto',width:'100%'}}>

        <div><h2 style={{fontSize:21,fontWeight:1000}}>📋 Theo dõi & quản trị báo cáo</h2><p style={{fontSize:13,color:'#64748b',fontWeight:700}}>Admin xem, chỉnh sửa, reset · 🔥 Firebase RTDB realtime</p></div>
        <select value={month} onChange={e=>setMonth(e.target.value)} style={{height:42,border:'2px solid #e2e8f0',borderRadius:10,padding:'0 13px',fontWeight:850,fontSize:13}}>
          {MONTHS.map(m=><option key={m} value={m}>{fmtMonth(m)}</option>)}
        </select>
      </div>
      {edit&&(
        <Card style={{padding:24,marginBottom:20,border:'2px solid #c7d2fe'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div><h3 style={{fontWeight:1000,fontSize:17}}>✏ Admin chỉnh sửa báo cáo</h3><p style={{fontSize:12,color:'#64748b',fontWeight:750}}>{edit.u.name} · {fmtMonth(month)}</p></div>
            <Btn kind="soft" onClick={()=>setEdit(null)}>✕</Btn>
          </div>
          <DynForm sections={db.reportSections||DEFAULT_REPORT_SECTIONS} initial={edit.rep?.data||{}} initialFiles={editFiles} withFiles submitText="Lưu với quyền Admin lên Firebase RTDB" onSubmit={adminSave}/>
        </Card>
      )}
      <Card style={{overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:1100}}>
            <thead>
              <tr style={{background:'#f8fafc',borderBottom:'2px solid #eef2f7'}}>
                {['Chi đoàn','Báo cáo tháng','Tổng ĐV','Kết nạp ĐV','File BC','Báo cáo đột xuất','Quyền bổ sung','Thao tác RTDB'].map(h=>(
                  <th key={h} style={{padding:12,textAlign:'left',fontSize:10,textTransform:'uppercase',color:'#64748b',fontWeight:900,whiteSpace:'nowrap'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map(({u,rep,adhocs})=>(
                <tr key={u.id} style={{borderBottom:'1px solid #f1f5f9'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#fafbff'}
                  onMouseLeave={e=>e.currentTarget.style.background=''}>
                  <td style={{padding:12,fontWeight:900,fontSize:13}}>{u.name}</td>
                  <td style={{padding:12}}>{rep?<Badge bg="#dcfce7" color="#166534">✓ {rep.submittedAt}{rep.adminEdited?' · Admin sửa':''}</Badge>:<Badge bg="#fee2e2" color="#991b1b">✗ Chưa nộp</Badge>}</td>
                  <td style={{padding:12,fontWeight:900}}>{rep?.data?.total_members||'—'}</td>
                  <td style={{padding:12,fontWeight:900}}>{rep?.data?.party_admitted??'—'}</td>

                  <td style={{padding:12}}><Badge bg={adhocs.length?'#fee2e2':'#f1f5f9'} color={adhocs.length?'#991b1b':'#64748b'}>{adhocs.length}</Badge></td>
                  <td style={{padding:12}}>
                    <Btn kind={db.settings?.allowOverride?.[u.id]?'ok':'soft'} style={{fontSize:12,padding:'6px 11px'}} onClick={()=>toggleOverride(u.id)}>
                      {db.settings?.allowOverride?.[u.id]?'🔓 Đang mở':'🔒 Mở quyền'}
                    </Btn>
                  </td>
                  <td style={{padding:12}}>
                    <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                      <Btn kind="soft" style={{fontSize:11,padding:'5px 9px'}} onClick={()=>openEdit(u,rep)}>{rep?'✏ Sửa':'➕ Tạo'}</Btn>
                      <Btn kind="danger" style={{fontSize:11,padding:'5px 9px'}} onClick={()=>resetRep(u.id)}>🗑 BC</Btn>
                      <Btn kind="danger" style={{fontSize:11,padding:'5px 9px'}} onClick={()=>resetAdhoc(u.id)}>🗑 ĐX</Btn>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </main>
  );
}

/* ═══ SCHEMA BUILDER ═══ */
function SchemaBuilder({db,toast,onDBChange}){
  const [kind,setKind]=useState('report');
  const [sections,setSections]=useState(JSON.parse(JSON.stringify(db.reportSections||DEFAULT_REPORT_SECTIONS)));
  useEffect(()=>setSections(JSON.parse(JSON.stringify(kind==='report'?db.reportSections||DEFAULT_REPORT_SECTIONS:db.adhocSections||DEFAULT_ADHOC_SECTIONS))),[kind]);
  function addField(si){const id=prompt('Mã trường (a-z, 0-9, dấu _):');if(!id||!/^[a-z_0-9]+$/.test(id)){toast('error','Mã trường không hợp lệ');return}const label=prompt('Tên hiển thị:')||id;const ns=[...sections];ns[si].fields.push({id,label,type:'textarea'});setSections(ns);}
  async function saveSchema(){if(kind==='report'){await FDB.saveReportSections(sections);onDBChange('reportSections',sections);}else{await FDB.saveAdhocSections(sections);onDBChange('adhocSections',sections);}toast('success','Đã lưu cấu hình trường lên Firebase RTDB');}
  return(
    <main style={{padding:28,maxWidth:1050,margin:'0 auto',width:'100%'}}>
      <h2 style={{fontSize:21,fontWeight:1000}}>🧩 Cấu hình trường nội dung · Firebase RTDB</h2>
      <p style={{fontSize:13,color:'#64748b',fontWeight:700,margin:'5px 0 18px'}}>Admin bổ sung, sửa, xóa trường theo từng tháng/năm · Đồng bộ RTDB</p>
      <div style={{display:'flex',gap:9,marginBottom:18}}>
        <Btn kind={kind==='report'?'primary':'soft'} onClick={()=>setKind('report')}>📝 Báo cáo định kỳ</Btn>
        <Btn kind={kind==='adhoc'?'primary':'soft'} onClick={()=>setKind('adhoc')}>🚨 Báo cáo đột xuất</Btn>
        <Btn kind="ok" onClick={saveSchema}>💾 Lưu lên Firebase RTDB</Btn>
      </div>
      {sections.map((s,si)=>(
        <Card key={s.id} style={{padding:20,marginBottom:14}}>
          <h3 style={{fontWeight:1000,fontSize:15,marginBottom:12}}>{s.title}</h3>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {s.fields.map((f,fi)=>(
              <div key={fi} style={{display:'grid',gridTemplateColumns:'1fr 1.5fr 120px 100px 36px',gap:8,alignItems:'center'}}>
                <input value={f.id} onChange={e=>{const ns=[...sections];ns[si].fields[fi].id=e.target.value;setSections(ns)}} style={{padding:'8px 9px',border:'1px solid #cbd5e1',borderRadius:8,fontFamily:'monospace',fontSize:12}}/>
                <input value={f.label} onChange={e=>{const ns=[...sections];ns[si].fields[fi].label=e.target.value;setSections(ns)}} style={{padding:'8px 9px',border:'1px solid #cbd5e1',borderRadius:8,fontSize:12}}/>
                <select value={f.type} onChange={e=>{const ns=[...sections];ns[si].fields[fi].type=e.target.value;setSections(ns)}} style={{padding:'8px 9px',border:'1px solid #cbd5e1',borderRadius:8,fontSize:12}}>
                  {['number','text','textarea','select'].map(t=><option key={t} value={t}>{t}</option>)}
                </select>
                <label style={{fontWeight:850,fontSize:12,display:'flex',gap:6,cursor:'pointer'}}><input type="checkbox" checked={!!f.required} onChange={e=>{const ns=[...sections];ns[si].fields[fi].required=e.target.checked;setSections(ns)}}/> Bắt buộc</label>
                <button onClick={()=>{const ns=[...sections];ns[si].fields.splice(fi,1);setSections(ns)}} style={{background:'#fee2e2',border:'none',borderRadius:7,padding:'7px',color:'#dc2626',fontWeight:900}}>✕</button>
              </div>
            ))}
          </div>
          <Btn kind="soft" style={{marginTop:11,fontSize:12}} onClick={()=>addField(si)}>➕ Thêm trường</Btn>
        </Card>
      ))}
    </main>
  );
}

/* ═══ SETTINGS ═══ */
function Settings({db,toast,onDBChange}){
  const [unitName,setUnitName]=useState('');
  const [newPw,setNewPw]=useState({});
  const units=Object.values(db.units||{});
  async function updateSettings(patch){const s={...(db.settings||{}),...patch};await FDB.saveSettings(s);onDBChange('settings',s);toast('success','Đã cập nhật cài đặt lên Firebase RTDB');}
  async function addUnit(){
    if(!unitName.trim())return;
    const id='unit_'+unitName.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/[^a-z0-9]+/g,'_');
    const nu={...(db.units||{}),[id]:{id,name:unitName.trim(),type:'unit'}};const np={...(db.passwords||{}),[id]:'123456'};
    await FDB.saveUnits(nu);await FDB.savePasswords(np);
    onDBChange('units',nu);onDBChange('passwords',np);setUnitName('');toast('success','Đã thêm chi đoàn lên Firebase RTDB');
  }
  async function deleteUnit(uid){
    if(!confirm('Xóa chi đoàn này?'))return;
    const nu={...db.units};delete nu[uid];await FDB.saveUnits(nu);onDBChange('units',nu);toast('warn','Đã xóa chi đoàn');
  }
  async function updatePw(uid){
    const p={...(db.passwords||{}),[uid]:newPw[uid]||(db.passwords||{})[uid]||'123456'};
    await FDB.savePasswords(p);onDBChange('passwords',p);toast('success','Đã cập nhật PIN lên Firebase RTDB');
  }
  async function exportBackup(){
    const snap={exportedAt:today(),version:APP_VERSION,units:db.units,passwords:db.passwords,settings:db.settings,indicators:db.indicators,reportSections:db.reportSections,adhocSections:db.adhocSections,announcements:db.announcements,reports:db.reports,adhocReports:db.adhocReports,tasks:db.tasks,taskProgress:db.taskProgress};
    const b=new Blob([JSON.stringify(snap,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`backup_cong_bao_cao_doan_${today().replace(/\//g,'-')}.json`;a.click();
    toast('success','Đã tải backup JSON');
  }
  return(
    <main style={{padding:28,maxWidth:900,margin:'0 auto',width:'100%'}}>
      <h2 style={{fontSize:21,fontWeight:1000,marginBottom:20}}>⚙️ Cài đặt hệ thống · Firebase RTDB</h2>
      <div style={{display:'grid',gap:16}}>
        <Card style={{padding:22}}>
          <h3 style={{fontWeight:1000,marginBottom:14}}>Cài đặt chung</h3>
          <div style={{display:'grid',gap:12}}>
            <label style={{display:'flex',alignItems:'center',gap:10,fontWeight:850,fontSize:14,cursor:'pointer'}}>
              <input type="checkbox" checked={!!db.settings?.isLocked} onChange={e=>updateSettings({isLocked:e.target.checked})}/> 🔒 Khóa hệ thống nộp báo cáo
            </label>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <label style={{fontWeight:850,fontSize:14}}>Hạn nộp ngày:</label>
              <input type="number" min={1} max={28} value={db.settings?.deadlineDay||10} onChange={e=>updateSettings({deadlineDay:toN(e.target.value)})}
                style={{width:65,padding:'8px 11px',border:'2px solid #e2e8f0',borderRadius:9,fontWeight:900,fontSize:17,textAlign:'center'}}/>
              <span style={{fontWeight:850}}>hàng tháng</span>
            </div>
          </div>
        </Card>
        <Card style={{padding:22}}>
          <h3 style={{fontWeight:1000,marginBottom:14}}>Quản lý chi đoàn & mã PIN · Firebase RTDB</h3>
          <div style={{display:'flex',gap:9,marginBottom:14}}>
            <input value={unitName} onChange={e=>setUnitName(e.target.value)} placeholder="Tên chi đoàn mới…" style={{flex:1,padding:'10px 13px',border:'2px solid #e2e8f0',borderRadius:10,fontWeight:700}}/>
            <Btn onClick={addUnit}>➕ Thêm</Btn>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {units.map(u=>(
              <div key={u.id} style={{display:'flex',alignItems:'center',gap:9,padding:'10px 13px',background:'#f8fafc',borderRadius:11,flexWrap:'wrap'}}>
                <span style={{flex:1,fontWeight:800,fontSize:13}}>{u.type==='admin'?'👑 ':'👤 '}{u.name} <span style={{fontSize:10,color:'#94a3b8',fontFamily:'monospace'}}>({u.id})</span></span>
                <input value={newPw[u.id]??(db.passwords||{})[u.id]??'123456'} onChange={e=>setNewPw({...newPw,[u.id]:e.target.value})}
                  type="password" style={{width:130,padding:'7px 10px',border:'1px solid #e2e8f0',borderRadius:8,fontFamily:'monospace',fontSize:13}}/>
                <Btn kind="soft" style={{fontSize:12,padding:'6px 11px'}} onClick={()=>updatePw(u.id)}>🔑 Cập nhật PIN</Btn>
                {u.type!=='admin'&&<Btn kind="danger" style={{fontSize:12,padding:'6px 11px'}} onClick={()=>deleteUnit(u.id)}>🗑</Btn>}
              </div>
            ))}
          </div>
        </Card>
        <Card style={{padding:22}}>
          <h3 style={{fontWeight:1000,marginBottom:8}}>Firebase RTDB · Sao lưu</h3>
          <p style={{fontSize:12,color:'#64748b',marginBottom:13,lineHeight:1.7}}>
            Dữ liệu lưu tại <b>bao-cao-doan</b> · asia-southeast1 · RTDB path: <code style={{fontSize:11,background:'#f1f5f9',padding:'2px 6px',borderRadius:5}}>cong_bao_cao_doan_v31</code><br/>
            Files minh chứng lưu tại: <code style={{fontSize:11,background:'#f1f5f9',padding:'2px 6px',borderRadius:5}}>cong_bao_cao_doan_v31/files/&#123;report|adhoc|progress&#125;/&#123;id&#125;</code><br/>
            RTDB Security Rules cần bao gồm: <code style={{fontSize:11,background:'#f1f5f9',padding:'2px 6px',borderRadius:5}}>"cong_bao_cao_doan_v31": {'{".read":true,".write":true}'}</code>
          </p>
          <Btn onClick={exportBackup}>📦 Tải backup JSON toàn bộ</Btn>
        </Card>
      </div>
    </main>
  );
}
